<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Get Ready - Flight Roster Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #059669;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans text-slate-900">

    <header class="bg-emerald-600 text-white p-6 shadow-md">
        <h1 class="text-xl font-bold flex items-center gap-2">✈️ Get Ready</h1>
        <p class="text-emerald-100 text-sm mt-1">Preparation for Reporting Duty (+3hrs)</p>
    </header>

    <main class="flex-grow p-4 max-w-lg mx-auto w-full space-y-4">
        
        <!-- Step 1: Authentication & List Selection -->
        <section id="auth-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                <h2 class="font-bold text-lg text-slate-800">Google Account</h2>
            </div>
            <div id="auth-status" class="space-y-3">
                <p id="status-text" class="text-slate-500 text-sm">Sign in to connect to your Google Tasks.</p>
                <button id="auth-btn" class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-sm">
                    Sign In with Google
                </button>
                
                <div id="list-selector-container" class="hidden space-y-2 pt-2 animate-in fade-in duration-500">
                    <label for="task-list-select" class="text-xs font-bold text-slate-400 uppercase tracking-wide">Save to list:</label>
                    <div class="relative">
                        <select id="task-list-select" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 appearance-none">
                            <option value="">Loading lists...</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Step 2: Image Input -->
        <section id="upload-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 opacity-50 pointer-events-none transition-opacity">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                <h2 class="font-bold text-lg text-slate-800">Upload Monthly Roster</h2>
            </div>
            
            <label for="file-input" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 active:bg-slate-100 cursor-pointer transition-colors">
                <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                    <svg class="w-8 h-8 mb-2 text-slate-400 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <p class="text-sm text-slate-500 font-medium font-bold">Upload Monthly Roster Screenshot</p>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-wider">Filtered for KUL origin trips</p>
                </div>
                <input id="file-input" type="file" accept="image/*" class="hidden" />
            </label>

            <div id="processing" class="hidden mt-4 p-3 bg-emerald-50 rounded-lg flex items-center justify-center gap-3 text-emerald-700 font-medium text-sm">
                <div class="loader"></div>
                Analyzing your trips...
            </div>
        </section>

        <!-- Step 3: Review & Sync -->
        <section id="results-section" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-slate-200 animate-in fade-in slide-in-from-bottom-4 duration-300">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">3</span>
                <h2 class="font-bold text-lg text-slate-800">Confirm Reminders</h2>
            </div>
            
            <div id="trips-list" class="space-y-3 mb-6"></div>

            <button id="sync-btn" class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-transform active:scale-95">
                Add Reminders
            </button>
        </section>
    </main>

    <!-- Success/Error Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl">
            <div id="modal-icon" class="text-5xl mb-4">✅</div>
            <h3 id="modal-title" class="text-xl font-bold mb-2">Success</h3>
            <p id="modal-msg" class="text-slate-500 mb-8 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Close</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = '692805772462-uka3qj57pqklh4el8gm4lrejju0q6t0q.apps.googleusercontent.com'; // PASTE YOUR CLIENT ID HERE
        const SCOPES = 'https://www.googleapis.com/auth/tasks';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest"];

        let tokenClient;
        let gapiInited = false;
        let detectedTrips = [];

        const authBtn = document.getElementById('auth-btn');
        const statusText = document.getElementById('status-text');
        const listSelectorContainer = document.getElementById('list-selector-container');
        const taskListSelect = document.getElementById('task-list-select');
        const uploadSection = document.getElementById('upload-section');
        const fileInput = document.getElementById('file-input');
        const processing = document.getElementById('processing');
        const resultsSection = document.getElementById('results-section');
        const tripsList = document.getElementById('trips-list');
        const syncBtn = document.getElementById('sync-btn');

        const EXCLUDE_CODES = [
            'JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC',
            'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN',
            'NBA', 'FS', 'OP', 'PS', 'DO', 'D', 'KUA'
        ];

        function gapiLoaded() {
            gapi.load('client', async () => {
                try {
                    await gapi.client.init({ discoveryDocs: DISCOVERY_DOCS });
                    gapiInited = true;
                    console.log("GAPI Initialized");
                } catch (e) {
                    console.error("GAPI Init Error", e);
                }
            });
        }

        function gisLoaded() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: async (resp) => {
                        if (resp.error !== undefined) {
                            console.error("GIS Error", resp);
                            return;
                        }
                        // CRITICAL: Set the token for GAPI client use
                        if (gapi.client) {
                            gapi.client.setToken(resp);
                        }
                        await handleAuthSuccess();
                    },
                });
                console.log("GIS Initialized");
            } catch (e) {
                console.error("GIS Init Error", e);
            }
        }

        async function handleAuthSuccess() {
            statusText.innerHTML = "✅ Connected to Google Tasks";
            authBtn.classList.add('hidden');
            listSelectorContainer.classList.remove('hidden');
            uploadSection.classList.remove('opacity-50', 'pointer-events-none');
            
            // Retry fetching lists up to 3 times if GAPI isn't quite ready
            let retries = 3;
            while(retries > 0) {
                const success = await fetchTaskLists();
                if (success) break;
                retries--;
                await new Promise(r => setTimeout(r, 1000));
            }
        }

        async function fetchTaskLists() {
            if (!gapiInited) return false;
            try {
                const response = await gapi.client.tasks.tasklists.list();
                const lists = response.result.items;
                
                if (lists && lists.length > 0) {
                    taskListSelect.innerHTML = '';
                    lists.forEach(list => {
                        const option = document.createElement('option');
                        option.value = list.id;
                        option.textContent = list.title;
                        if (list.title === 'Flights') option.selected = true;
                        taskListSelect.appendChild(option);
                    });
                    return true;
                }
            } catch (e) {
                console.error("Error fetching lists", e);
                taskListSelect.innerHTML = '<option value="@default">Default List</option>';
            }
            return false;
        }

        authBtn.onclick = () => {
            if (!tokenClient) {
                showModal('Error', 'Google Sign-In is not initialized. Please refresh.', '❌');
                return;
            }
            tokenClient.requestAccessToken();
        };

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            processing.classList.remove('hidden');
            resultsSection.classList.add('hidden');
            try {
                const result = await Tesseract.recognize(file, 'eng');
                extractData(result.data.text);
            } catch (err) {
                showModal('Error', 'Reading failed. Try a clearer screenshot.', '❌');
            } finally {
                processing.classList.add('hidden');
            }
        };

        function extractData(text) {
            detectedTrips = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 10);
            
            const dateRegex = /(\d{2}-[A-Z]{3}-\d{4})/;
            const timeRegex = /(\d{2}:\d{2})/;
            const flightRegex = /(MH\s?\d+)/;
            const airportRegex = /\b([A-Z]{3})\b/g;

            lines.forEach((line, index) => {
                const dateMatch = line.match(dateRegex);
                const flightMatch = line.match(flightRegex);
                
                if (dateMatch && flightMatch) {
                    const dateStr = dateMatch[0];
                    const flight = flightMatch[0];
                    const times = line.match(new RegExp(timeRegex, 'g')) || [];
                    let airports = (line.match(airportRegex) || []).filter(code => !EXCLUDE_CODES.includes(code));

                    if (airports[0] === 'KUL' && times.length > 0) {
                        const reportingTime = times[0];
                        const dest = airports[1] || "???";
                        
                        let routePorts = ['KUL', dest];
                        for (let i = 1; i <= 3; i++) {
                            const nextLine = lines[index + i];
                            if (!nextLine) break;
                            
                            const nextAirports = (nextLine.match(airportRegex) || []).filter(code => !EXCLUDE_CODES.includes(code));
                            const nextFlight = nextLine.match(flightRegex);
                            
                            if (nextAirports.includes('KUL')) {
                                if (!routePorts.includes('KUL', 1)) routePorts.push('KUL');
                                break;
                            } else if (nextFlight && nextAirports.length > 1) {
                                const lastPort = nextAirports[nextAirports.length - 1];
                                if (!routePorts.includes(lastPort)) routePorts.push(lastPort);
                            }
                        }

                        const routeStr = `(${routePorts.join('/')})`;
                        const dutyTime = new Date(`${dateStr} ${reportingTime}`);

                        if (!isNaN(dutyTime.getTime())) {
                            const reminderTime = new Date(dutyTime.getTime() - (3 * 60 * 60 * 1000));
                            const key = `${dateStr}-${flight}`;
                            
                            if (!detectedTrips.find(t => t.key === key)) {
                                detectedTrips.push({
                                    key: key,
                                    // UPDATED PREFIX PER REQUEST
                                    taskTitle: `Prep for ${flight} (Reporting: ${reportingTime})`,
                                    displayRoute: routeStr,
                                    date: dateStr,
                                    original: dutyTime,
                                    reminder: reminderTime,
                                    startTime: reportingTime
                                });
                            }
                        }
                    }
                }
            });

            if (detectedTrips.length > 0) renderList();
            else showModal('No Trips Found', 'Ensure the roster shows reporting times and routes starting with KUL.', '🔍');
        }

        function renderList() {
            tripsList.innerHTML = '';
            detectedTrips.forEach(trip => {
                const item = document.createElement('div');
                item.className = "p-4 bg-emerald-50 border border-emerald-100 rounded-xl flex justify-between items-center shadow-sm";
                item.innerHTML = `
                    <div class="space-y-1">
                        <div class="font-bold text-emerald-900 leading-tight">${trip.taskTitle}</div>
                        <div class="text-[10px] font-black text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded inline-block uppercase tracking-wider">${trip.displayRoute}</div>
                        <div class="text-xs text-slate-500 font-medium pt-1">${trip.date}</div>
                    </div>
                    <div class="text-right ml-2 shrink-0">
                        <div class="text-[10px] text-slate-400 font-bold uppercase">Reminder</div>
                        <div class="text-sm font-black text-slate-900">${trip.reminder.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                `;
                tripsList.appendChild(item);
            });
            resultsSection.classList.remove('hidden');
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        syncBtn.onclick = async () => {
            const listId = taskListSelect.value;
            if (!listId) return;
            syncBtn.disabled = true;
            syncBtn.innerText = "Syncing...";
            try {
                for (const trip of detectedTrips) {
                    await gapi.client.tasks.tasks.insert({
                        tasklist: listId,
                        resource: {
                            title: trip.taskTitle,
                            notes: `Route: ${trip.displayRoute}\nReporting at ${trip.startTime} on ${trip.date}.`,
                            due: trip.reminder.toISOString()
                        }
                    });
                }
                showModal('Synced!', `${detectedTrips.length} reminders added.`, '✅');
                resultsSection.classList.add('hidden');
                fileInput.value = '';
            } catch (err) {
                showModal('Sync Failed', 'Connection error.', '❌');
            } finally {
                syncBtn.disabled = false;
                syncBtn.innerText = "Add Reminders";
            }
        };

        function showModal(title, msg, icon) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        window.onload = () => {
            const g1 = document.createElement('script'); g1.src = "https://apis.google.com/js/api.js"; g1.onload = gapiLoaded; document.head.appendChild(g1);
            const g2 = document.createElement('script'); g2.src = "https://accounts.google.com/gsi/client"; g2.onload = gisLoaded; document.head.appendChild(g2);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flight Roster Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans text-slate-900">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-6 shadow-md">
        <h1 class="text-xl font-bold flex items-center gap-2">
            ✈️ Roster Sync
        </h1>
        <p class="text-blue-100 text-sm mt-1">Automatic 3-hour lead time reminders</p>
    </header>

    <main class="flex-grow p-4 max-w-lg mx-auto w-full space-y-4">
        
        <!-- Step 1: Authentication & List Selection -->
        <section id="auth-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                <h2 class="font-bold text-lg">Google Account</h2>
            </div>
            <div id="auth-status" class="space-y-4">
                <div id="logged-out-view">
                    <p id="status-text" class="text-slate-500 text-sm mb-3">Sign in to allow the app to add reminders to your Google Tasks.</p>
                    <button id="auth-btn" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-sm">
                        Sign In with Google
                    </button>
                </div>
                
                <!-- List Selector (Hidden until login) -->
                <div id="logged-in-view" class="hidden space-y-3">
                    <p class="text-green-600 text-sm font-bold flex items-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        Connected
                    </p>
                    <div class="space-y-1">
                        <label for="list-select" class="text-xs font-bold text-slate-400 uppercase tracking-wider">Select Target List</label>
                        <select id="list-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="@default">Loading lists...</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- Step 2: Image Input -->
        <section id="upload-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 opacity-50 pointer-events-none transition-opacity">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                <h2 class="font-bold text-lg">Upload Roster</h2>
            </div>
            
            <label for="file-input" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 active:bg-slate-100 cursor-pointer transition-colors">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg class="w-8 h-8 mb-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <p class="text-sm text-slate-500 font-medium text-center px-4">Tap to take photo or select screenshot</p>
                </div>
                <input id="file-input" type="file" accept="image/*" class="hidden" />
            </label>

            <div id="processing" class="hidden mt-4 p-3 bg-blue-50 rounded-lg flex items-center justify-center gap-3 text-blue-700 font-medium text-sm">
                <div class="loader"></div>
                Analyzing image...
            </div>
        </section>

        <!-- Step 3: Review & Sync -->
        <section id="results-section" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-slate-200 animate-in fade-in slide-in-from-bottom-4 duration-300">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">3</span>
                <h2 class="font-bold text-lg">Review Reminders</h2>
            </div>
            
            <div id="trips-list" class="space-y-3 mb-6">
                <!-- Trip items injected here -->
            </div>

            <button id="sync-btn" class="w-full bg-green-600 active:bg-green-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-transform active:scale-95">
                Add to Google Tasks
            </button>
        </section>

    </main>

    <!-- Success/Error Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl">
            <div id="modal-icon" class="text-5xl mb-4">✅</div>
            <h3 id="modal-title" class="text-xl font-bold mb-2">Success</h3>
            <p id="modal-msg" class="text-slate-500 mb-8 leading-relaxed">Your reminders have been added.</p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Awesome</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = ''; 
        const SCOPES = 'https://www.googleapis.com/auth/tasks';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest"];

        let tokenClient;
        let gapiInited = false;
        let detectedTrips = [];

        // DOM References
        const authBtn = document.getElementById('auth-btn');
        const loggedOutView = document.getElementById('logged-out-view');
        const loggedInView = document.getElementById('logged-in-view');
        const listSelect = document.getElementById('list-select');
        const uploadSection = document.getElementById('upload-section');
        const fileInput = document.getElementById('file-input');
        const processing = document.getElementById('processing');
        const resultsSection = document.getElementById('results-section');
        const tripsList = document.getElementById('trips-list');
        const syncBtn = document.getElementById('sync-btn');

        // --- GOOGLE IDENTITY SERVICES ---
        function gapiLoaded() {
            gapi.load('client', async () => {
                await gapi.client.init({ discoveryDocs: DISCOVERY_DOCS });
                gapiInited = true;
            });
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                    if (resp.error !== undefined) throw (resp);
                    await handleAuthSuccess();
                },
            });
        }

        async function handleAuthSuccess() {
            loggedOutView.classList.add('hidden');
            loggedInView.classList.remove('hidden');
            uploadSection.classList.remove('opacity-50', 'pointer-events-none');
            
            // Populate list selection
            try {
                const response = await gapi.client.tasks.tasklists.list();
                const lists = response.result.items || [];
                
                listSelect.innerHTML = ''; // Clear loading
                lists.forEach(list => {
                    const option = document.createElement('option');
                    option.value = list.id;
                    option.text = list.title;
                    // Auto-select "Flights" if it exists
                    if (list.title.toLowerCase() === 'flights') option.selected = true;
                    listSelect.add(option);
                });
            } catch (e) {
                listSelect.innerHTML = '<option value="@default">Default List</option>';
            }
        }

        authBtn.onclick = () => {
            if (tokenClient) tokenClient.requestAccessToken();
        };

        // --- OCR & PARSING ---
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            processing.classList.remove('hidden');
            resultsSection.classList.add('hidden');

            try {
                const result = await Tesseract.recognize(file, 'eng');
                extractData(result.data.text);
            } catch (err) {
                showModal('Error', 'Could not read image.', '❌');
            } finally {
                processing.classList.add('hidden');
            }
        };

        function extractData(text) {
            detectedTrips = [];
            const lines = text.split('\n');
            const pattern = /(\d{1,2}-[A-Z]{3}).*?(MH\s?\d+).*?(\d{2}:\d{2})/;

            lines.forEach(line => {
                const match = line.match(pattern);
                if (match) {
                    const [_, dateStr, flight, startTime] = match;
                    const year = new Date().getFullYear();
                    const dutyTime = new Date(`${dateStr} ${year} ${startTime}`);
                    
                    if (!isNaN(dutyTime.getTime())) {
                        const reminderTime = new Date(dutyTime.getTime() - (3 * 60 * 60 * 1000));
                        detectedTrips.push({
                            title: `Get ready for ${flight} (Reporting: ${startTime})`,
                            original: dutyTime,
                            reminder: reminderTime,
                            startTime: startTime
                        });
                    }
                }
            });

            if (detectedTrips.length > 0) {
                renderList();
            } else {
                showModal('Not Found', 'No flight data detected.', '🔍');
            }
        }

        function renderList() {
            tripsList.innerHTML = '';
            detectedTrips.forEach(trip => {
                const item = document.createElement('div');
                item.className = "p-4 bg-slate-50 border border-slate-200 rounded-xl flex justify-between items-center";
                item.innerHTML = `
                    <div class="space-y-1">
                        <div class="font-bold text-slate-800">${trip.title}</div>
                        <div class="text-xs text-slate-500 font-medium">Reporting: ${trip.startTime} (${trip.original.toLocaleDateString()})</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-blue-600 font-bold uppercase tracking-wider">Reminder</div>
                        <div class="text-sm font-black text-slate-900">${trip.reminder.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                `;
                tripsList.appendChild(item);
            });
            resultsSection.classList.remove('hidden');
        }

        // --- TASK SYNC ---
        syncBtn.onclick = async () => {
            const selectedListId = listSelect.value;
            syncBtn.disabled = true;
            syncBtn.innerText = "Syncing...";

            try {
                for (const trip of detectedTrips) {
                    await gapi.client.tasks.tasks.insert({
                        tasklist: selectedListId,
                        resource: {
                            title: trip.title,
                            notes: `Set 3h before reporting (${trip.original.toLocaleString()})`,
                            due: trip.reminder.toISOString()
                        }
                    });
                }
                showModal('Synced!', 'Reminders added successfully.', '✅');
                resultsSection.classList.add('hidden');
                fileInput.value = '';
            } catch (err) {
                showModal('Sync Failed', 'Error connecting to Tasks.', '❌');
            } finally {
                syncBtn.disabled = false;
                syncBtn.innerText = "Add to Google Tasks";
            }
        };

        function showModal(title, msg, icon) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        window.onload = () => {
            const gapiScript = document.createElement('script');
            gapiScript.src = "https://apis.google.com/js/api.js";
            gapiScript.onload = gapiLoaded;
            document.head.appendChild(gapiScript);

            const gisScript = document.createElement('script');
            gisScript.src = "https://accounts.google.com/gsi/client";
            gisScript.onload = gisLoaded;
            document.head.appendChild(gisScript);
        };
    </script>
</body>
</html>
